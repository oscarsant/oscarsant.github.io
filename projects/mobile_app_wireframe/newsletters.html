<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Newsletter Following</title>
    <link rel="stylesheet" href="css/base/variables.css" />
    <link rel="stylesheet" href="css/base/reset.css" />
    <link rel="stylesheet" href="css/base/typography.css" />
    <link rel="stylesheet" href="css/themes/consumer-theme.css" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="css/newsletters.css" />
</head>

<body>
    <div class="newsletter-following-page">
        <!-- Header -->
        <header class="newsletter-header">
            <h1>Newsletters</h1>
            <p>Manage your subscriptions and discover new newsletters to follow.</p>
        </header>

        <!-- Followed Newsletters -->
        <section class="followed-newsletters">
            <h2>Your Subscriptions</h2>
            <ul id="followed-list">
                <!-- Dynamically populated with followed newsletters -->
            </ul>
        </section>

        <!-- Discover Newsletters -->
        <section class="discover-newsletters">
            <h2>Discover Newsletters</h2>
            <ul id="discover-list">
                <!-- Dynamically populated with available newsletters -->
            </ul>
        </section>
    </div>
    <script src="js/newsletters.js"></script>
</body>

</html>
