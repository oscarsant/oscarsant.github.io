<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings</title>
    <link rel="stylesheet" href="settings.css">
</head>

<body>
    <header class="settings-header">
        <button class="settings-back-btn" onclick="window.location.href='index.html'">
            <img src="img/chevron-left - 20x20.svg" alt="Back" />
        </button>
        <h1>Settings</h1>
    </header>
    <main class="settings-main">
        <section class="settings-user-info">
            <div class="settings-user-avatar">OS</div>
            <div class="settings-user-details">
                <h2>Oscar Santamarina</h2>
                <p>proaccount@politico.com</p>
            </div>
        </section>
        <section class="settings-options">
            <div class="settings-option">
                <label for="notifications-toggle">Push Notifications</label>
                <input type="checkbox" id="notifications-toggle" checked>
            </div>
            <div class="settings-option">
                <label for="theme-select">Theme</label>
                <select id="theme-select">
                    <option value="consumer">Consumer</option>
                    <option value="pro">Pro</option>
                </select>
            </div>
            <button class="settings-logout-btn">Log Out</button>
        </section>
    </main>
</body>

</html>
