<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="shortcut icon" type="image/x-icon" href="/mylogo.svg" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="icon.svg" />
    <meta charset="utf-8" />
    <meta content="IE=edge" http-equiv="X-UA-Compatible" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Numbers" />
    <meta name="theme-color" content="#111111" />
    <title>Make Numbers</title>
    <meta name="description"
        content="A mobile-first finance app concept for shaping better numbers around income, investing, future projections, and different portfolio styles." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <link rel="stylesheet" href="/css/main.css" />
    <link rel="stylesheet" href="make-numbers.css" />
    <link rel="preload"
        href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@300;400;600;700;800&family=Oswald:wght@200;300;400;500;600;700&display=swap"
        as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript>
        <link rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@300;400;600;700;800&family=Oswald:wght@200;300;400;500;600;700&display=swap">
    </noscript>
</head>

<body class="numbers-page">
    <nav class="numbers-nav" aria-label="Site navigation">
        <a class="numbers-nav__back" href="/" aria-label="Back to home" title="Back to home">
            <svg width="17" height="14" viewBox="0 0 17 14" fill="none" xmlns="http://www.w3.org/2000/svg"
                aria-hidden="true" focusable="false">
                <path d="M15.75 6.77461H0.75L6.7998 0.75M6.7998 12.799L3.01855 9.03401" stroke="currentColor"
                    stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
        </a>
        <a class="numbers-nav__logo" href="/" aria-label="Oscar Santamariña home">
            <img src="/mylogo.svg" alt="Oscar Santamariña" />
        </a>
    </nav>

    <!-- Income sources sheet -->
    <div class="numbers-sheet" id="incomeSheet" role="dialog" aria-modal="true" aria-label="Add income source">
        <div class="numbers-sheet__backdrop" id="incomeSheetBackdrop"></div>
        <div class="numbers-sheet__drawer">
            <div class="numbers-sheet__handle"></div>
            <div class="numbers-sheet__head">
                <span class="numbers-sheet__title">What kind of income?</span>
                <button class="numbers-sheet__close" id="incomeSheetClose" type="button" aria-label="Close">×</button>
            </div>
            <div class="numbers-sheet__grid" id="incomeSheetGrid">
                <button class="numbers-cat-btn" type="button" data-type="employment">
                    <span class="numbers-cat-btn__icon"><span class="material-symbols-outlined numbers-cat-icon"
                            aria-hidden="true">work</span></span>
                    <span class="numbers-cat-btn__label">Job</span>
                </button>
                <button class="numbers-cat-btn" type="button" data-type="freelance">
                    <span class="numbers-cat-btn__icon"><span class="material-symbols-outlined numbers-cat-icon"
                            aria-hidden="true">laptop_mac</span></span>
                    <span class="numbers-cat-btn__label">Freelance</span>
                </button>
                <button class="numbers-cat-btn" type="button" data-type="rental">
                    <span class="numbers-cat-btn__icon"><span class="material-symbols-outlined numbers-cat-icon"
                            aria-hidden="true">apartment</span></span>
                    <span class="numbers-cat-btn__label">Rental</span>
                </button>
                <button class="numbers-cat-btn" type="button" data-type="pension">
                    <span class="numbers-cat-btn__icon"><span class="material-symbols-outlined numbers-cat-icon"
                            aria-hidden="true">elderly</span></span>
                    <span class="numbers-cat-btn__label">Pension</span>
                </button>
                <button class="numbers-cat-btn" type="button" data-type="withdrawal401k">
                    <span class="numbers-cat-btn__icon"><span class="material-symbols-outlined numbers-cat-icon"
                            aria-hidden="true">account_balance</span></span>
                    <span class="numbers-cat-btn__label">401(k) Withdrawal</span>
                </button>
                <button class="numbers-cat-btn" type="button" data-type="withdrawalIra">
                    <span class="numbers-cat-btn__icon"><span class="material-symbols-outlined numbers-cat-icon"
                            aria-hidden="true">savings</span></span>
                    <span class="numbers-cat-btn__label">IRA Withdrawal</span>
                </button>
                <button class="numbers-cat-btn" type="button" data-type="withdrawalRoth">
                    <span class="numbers-cat-btn__icon"><span class="material-symbols-outlined numbers-cat-icon"
                            aria-hidden="true">account_balance_wallet</span></span>
                    <span class="numbers-cat-btn__label">Roth Withdrawal</span>
                </button>
                <button class="numbers-cat-btn" type="button" data-type="withdrawalBrokerage">
                    <span class="numbers-cat-btn__icon"><span class="material-symbols-outlined numbers-cat-icon"
                            aria-hidden="true">candlestick_chart</span></span>
                    <span class="numbers-cat-btn__label">Brokerage Dist.</span>
                </button>
                <button class="numbers-cat-btn" type="button" data-type="unemployment">
                    <span class="numbers-cat-btn__icon"><span class="material-symbols-outlined numbers-cat-icon"
                            aria-hidden="true">person_off</span></span>
                    <span class="numbers-cat-btn__label">Unemploy&shy;ment</span>
                </button>
                <button class="numbers-cat-btn" type="button" data-type="ssdi">
                    <span class="numbers-cat-btn__icon"><span class="material-symbols-outlined numbers-cat-icon"
                            aria-hidden="true">health_and_safety</span></span>
                    <span class="numbers-cat-btn__label">SSDI</span>
                </button>
                <button class="numbers-cat-btn" type="button" data-type="ssi">
                    <span class="numbers-cat-btn__icon"><span class="material-symbols-outlined numbers-cat-icon"
                            aria-hidden="true">volunteer_activism</span></span>
                    <span class="numbers-cat-btn__label">SSI</span>
                </button>
                <button class="numbers-cat-btn" type="button" data-type="other">
                    <span class="numbers-cat-btn__icon"><span class="material-symbols-outlined numbers-cat-icon"
                            aria-hidden="true">more_horiz</span></span>
                    <span class="numbers-cat-btn__label">Other</span>
                </button>
            </div>
            <div class="numbers-sheet__name-prompt" id="incomeNamePrompt" hidden>
                <label class="numbers-sheet__name-label">What would you call it?</label>
                <div class="numbers-sheet__name-row">
                    <input class="numbers-sheet__name-input" id="incomeNameInput" type="text"
                        placeholder="e.g. Side gig" maxlength="40" autocomplete="off" />
                    <button class="numbers-sheet__name-confirm" id="incomeNameConfirm" type="button">Add</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Spending sheet -->
    <div class="numbers-sheet" id="spendingSheet" role="dialog" aria-modal="true" aria-label="Add spending category">
        <div class="numbers-sheet__backdrop" id="spendingSheetBackdrop"></div>
        <div class="numbers-sheet__drawer">
            <div class="numbers-sheet__handle"></div>
            <div class="numbers-sheet__head">
                <span class="numbers-sheet__title">What do you spend on?</span>
                <button class="numbers-sheet__close" id="spendingSheetClose" type="button" aria-label="Close">×</button>
            </div>
            <div class="numbers-sheet__grid" id="spendingSheetGrid">
                <button class="numbers-cat-btn" type="button" data-type="rent">
                    <span class="numbers-cat-btn__icon"><span class="material-symbols-outlined numbers-cat-icon"
                            aria-hidden="true">home</span></span>
                    <span class="numbers-cat-btn__label">Rent</span>
                </button>
                <button class="numbers-cat-btn" type="button" data-type="food">
                    <span class="numbers-cat-btn__icon"><span class="material-symbols-outlined numbers-cat-icon"
                            aria-hidden="true">restaurant</span></span>
                    <span class="numbers-cat-btn__label">Food</span>
                </button>
                <button class="numbers-cat-btn" type="button" data-type="transport">
                    <span class="numbers-cat-btn__icon"><span class="material-symbols-outlined numbers-cat-icon"
                            aria-hidden="true">directions_car</span></span>
                    <span class="numbers-cat-btn__label">Transport</span>
                </button>
                <button class="numbers-cat-btn" type="button" data-type="utilities">
                    <span class="numbers-cat-btn__icon"><span class="material-symbols-outlined numbers-cat-icon"
                            aria-hidden="true">bolt</span></span>
                    <span class="numbers-cat-btn__label">Utilities</span>
                </button>
                <button class="numbers-cat-btn" type="button" data-type="subscriptions">
                    <span class="numbers-cat-btn__icon"><span class="material-symbols-outlined numbers-cat-icon"
                            aria-hidden="true">subscriptions</span></span>
                    <span class="numbers-cat-btn__label">Subscriptions</span>
                </button>
                <button class="numbers-cat-btn" type="button" data-type="medical">
                    <span class="numbers-cat-btn__icon"><span class="material-symbols-outlined numbers-cat-icon"
                            aria-hidden="true">medical_services</span></span>
                    <span class="numbers-cat-btn__label">Medical</span>
                </button>
                <button class="numbers-cat-btn" type="button" data-type="other">
                    <span class="numbers-cat-btn__icon"><span class="material-symbols-outlined numbers-cat-icon"
                            aria-hidden="true">more_horiz</span></span>
                    <span class="numbers-cat-btn__label">Other</span>
                </button>
            </div>
            <div class="numbers-sheet__name-prompt" id="spendingNamePrompt" hidden>
                <label class="numbers-sheet__name-label">What would you call it?</label>
                <div class="numbers-sheet__name-row">
                    <input class="numbers-sheet__name-input" id="spendingNameInput" type="text"
                        placeholder="e.g. Gym membership" maxlength="40" autocomplete="off" />
                    <button class="numbers-sheet__name-confirm" id="spendingNameConfirm" type="button">Add</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Debt sheet -->
    <div class="numbers-sheet" id="debtSheet" role="dialog" aria-modal="true" aria-label="Add debt">
        <div class="numbers-sheet__backdrop" id="debtSheetBackdrop"></div>
        <div class="numbers-sheet__drawer">
            <div class="numbers-sheet__handle"></div>
            <div class="numbers-sheet__head">
                <span class="numbers-sheet__title">What kind of debt?</span>
                <button class="numbers-sheet__close" id="debtSheetClose" type="button" aria-label="Close">×</button>
            </div>
            <div class="numbers-sheet__grid" id="debtSheetGrid">
                <button class="numbers-cat-btn" type="button" data-type="creditcard">
                    <span class="numbers-cat-btn__icon"><span class="material-symbols-outlined numbers-cat-icon"
                            aria-hidden="true">credit_card</span></span>
                    <span class="numbers-cat-btn__label">Credit Card</span>
                </button>
                <button class="numbers-cat-btn" type="button" data-type="carloan">
                    <span class="numbers-cat-btn__icon"><span class="material-symbols-outlined numbers-cat-icon"
                            aria-hidden="true">directions_car</span></span>
                    <span class="numbers-cat-btn__label">Car Loan</span>
                </button>
                <button class="numbers-cat-btn" type="button" data-type="studentloan">
                    <span class="numbers-cat-btn__icon"><span class="material-symbols-outlined numbers-cat-icon"
                            aria-hidden="true">school</span></span>
                    <span class="numbers-cat-btn__label">Student Loan</span>
                </button>
                <button class="numbers-cat-btn" type="button" data-type="personalloan">
                    <span class="numbers-cat-btn__icon"><span class="material-symbols-outlined numbers-cat-icon"
                            aria-hidden="true">person</span></span>
                    <span class="numbers-cat-btn__label">Personal Loan</span>
                </button>
                <button class="numbers-cat-btn" type="button" data-type="medical">
                    <span class="numbers-cat-btn__icon"><span class="material-symbols-outlined numbers-cat-icon"
                            aria-hidden="true">medical_services</span></span>
                    <span class="numbers-cat-btn__label">Medical Debt</span>
                </button>
                <button class="numbers-cat-btn" type="button" data-type="heloc">
                    <span class="numbers-cat-btn__icon"><span class="material-symbols-outlined numbers-cat-icon"
                            aria-hidden="true">home</span></span>
                    <span class="numbers-cat-btn__label">HELOC</span>
                </button>
                <button class="numbers-cat-btn" type="button" data-type="bnpl">
                    <span class="numbers-cat-btn__icon"><span class="material-symbols-outlined numbers-cat-icon"
                            aria-hidden="true">payments</span></span>
                    <span class="numbers-cat-btn__label">Buy Now Pay Later</span>
                </button>
                <button class="numbers-cat-btn" type="button" data-type="other">
                    <span class="numbers-cat-btn__icon"><span class="material-symbols-outlined numbers-cat-icon"
                            aria-hidden="true">more_horiz</span></span>
                    <span class="numbers-cat-btn__label">Other</span>
                </button>
            </div>
            <div class="numbers-sheet__name-prompt" id="debtNamePrompt" hidden>
                <label class="numbers-sheet__name-label">What would you call it?</label>
                <div class="numbers-sheet__name-row">
                    <input class="numbers-sheet__name-input" id="debtNameInput" type="text"
                        placeholder="e.g. Family loan" maxlength="40" autocomplete="off" />
                    <button class="numbers-sheet__name-confirm" id="debtNameConfirm" type="button">Add</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Assets sheet -->
    <div class="numbers-sheet" id="assetsSheet" role="dialog" aria-modal="true" aria-label="Add asset">
        <div class="numbers-sheet__backdrop" id="assetsSheetBackdrop"></div>
        <div class="numbers-sheet__drawer">
            <div class="numbers-sheet__handle"></div>
            <div class="numbers-sheet__head">
                <span class="numbers-sheet__title">What type of asset?</span>
                <button class="numbers-sheet__close" id="assetsSheetClose" type="button" aria-label="Close">×</button>
            </div>
            <div class="numbers-sheet__grid" id="assetsSheetGrid">
                <button class="numbers-cat-btn" type="button" data-type="savings">
                    <span class="numbers-cat-btn__icon"><span class="material-symbols-outlined numbers-cat-icon"
                            aria-hidden="true">savings</span></span>
                    <span class="numbers-cat-btn__label">Savings</span>
                </button>
                <button class="numbers-cat-btn" type="button" data-type="k401">
                    <span class="numbers-cat-btn__icon"><span class="material-symbols-outlined numbers-cat-icon"
                            aria-hidden="true">account_balance</span></span>
                    <span class="numbers-cat-btn__label">401(k)</span>
                </button>
                <button class="numbers-cat-btn" type="button" data-type="realestate">
                    <span class="numbers-cat-btn__icon"><span class="material-symbols-outlined numbers-cat-icon"
                            aria-hidden="true">real_estate_agent</span></span>
                    <span class="numbers-cat-btn__label">Real Estate</span>
                </button>
                <button class="numbers-cat-btn" type="button" data-type="brokerage">
                    <span class="numbers-cat-btn__icon"><span class="material-symbols-outlined numbers-cat-icon"
                            aria-hidden="true">candlestick_chart</span></span>
                    <span class="numbers-cat-btn__label">Brokerage</span>
                </button>
                <button class="numbers-cat-btn" type="button" data-type="roth">
                    <span class="numbers-cat-btn__icon"><span class="material-symbols-outlined numbers-cat-icon"
                            aria-hidden="true">account_balance_wallet</span></span>
                    <span class="numbers-cat-btn__label">Roth IRA</span>
                </button>
                <button class="numbers-cat-btn" type="button" data-type="ira">
                    <span class="numbers-cat-btn__icon"><span class="material-symbols-outlined numbers-cat-icon"
                            aria-hidden="true">savings</span></span>
                    <span class="numbers-cat-btn__label">IRA</span>
                </button>
                <button class="numbers-cat-btn" type="button" data-type="auto">
                    <span class="numbers-cat-btn__icon"><span class="material-symbols-outlined numbers-cat-icon"
                            aria-hidden="true">directions_car</span></span>
                    <span class="numbers-cat-btn__label">Vehicle</span>
                </button>
                <button class="numbers-cat-btn" type="button" data-type="emergency">
                    <span class="numbers-cat-btn__icon"><span class="material-symbols-outlined numbers-cat-icon"
                            aria-hidden="true">health_and_safety</span></span>
                    <span class="numbers-cat-btn__label">Emergency Fund</span>
                </button>
                <button class="numbers-cat-btn" type="button" data-type="crypto">
                    <span class="numbers-cat-btn__icon"><span class="material-symbols-outlined numbers-cat-icon"
                            aria-hidden="true">currency_bitcoin</span></span>
                    <span class="numbers-cat-btn__label">Crypto</span>
                </button>
                <button class="numbers-cat-btn" type="button" data-type="hsa">
                    <span class="numbers-cat-btn__icon"><span class="material-symbols-outlined numbers-cat-icon"
                            aria-hidden="true">healing</span></span>
                    <span class="numbers-cat-btn__label">HSA</span>
                </button>
                <button class="numbers-cat-btn" type="button" data-type="k529">
                    <span class="numbers-cat-btn__icon"><span class="material-symbols-outlined numbers-cat-icon"
                            aria-hidden="true">school</span></span>
                    <span class="numbers-cat-btn__label">529 Plan</span>
                </button>
                <button class="numbers-cat-btn" type="button" data-type="pension">
                    <span class="numbers-cat-btn__icon"><span class="material-symbols-outlined numbers-cat-icon"
                            aria-hidden="true">elderly</span></span>
                    <span class="numbers-cat-btn__label">Pension</span>
                </button>
                <button class="numbers-cat-btn" type="button" data-type="other">
                    <span class="numbers-cat-btn__icon"><span class="material-symbols-outlined numbers-cat-icon"
                            aria-hidden="true">more_horiz</span></span>
                    <span class="numbers-cat-btn__label">Other</span>
                </button>
            </div>
            <div class="numbers-sheet__name-prompt" id="assetsNamePrompt" hidden>
                <label class="numbers-sheet__name-label">What would you call it?</label>
                <div class="numbers-sheet__name-row">
                    <input class="numbers-sheet__name-input" id="assetsNameInput" type="text"
                        placeholder="e.g. Collectibles" maxlength="40" autocomplete="off" />
                    <button class="numbers-sheet__name-confirm" id="assetsNameConfirm" type="button">Add</button>
                </div>
            </div>
        </div>
    </div>

    <section class="numbers-app" aria-label="Make Numbers">
        <div class="numbers-app__layout">
            <div class="numbers-phone-wrap">
                <div class="numbers-phone">
                    <!-- ── Shared hero (always visible) ── -->
                    <div class="numbers-card numbers-card--hero">
                        <div class="numbers-hero-split">
                            <div class="numbers-hero-col">
                                <div class="numbers-section-label">Net worth today</div>
                                <div class="numbers-hero-value" id="netWorthHeroValue"></div>
                            </div>
                            <div class="numbers-hero-divider"></div>
                            <div class="numbers-hero-col">
                                <div class="numbers-section-label">Projected <span id="projectionYearsLabel">10
                                        yrs</span></div>
                                <div class="numbers-hero-value numbers-hero-value--projected" id="projectedValue"></div>
                            </div>
                        </div>
                        <div class="numbers-hero-cashflow">
                            <div class="numbers-cashflow-row">
                                <div class="numbers-cashflow-item">
                                    <div class="numbers-section-label">Income</div>
                                    <div class="numbers-cashflow-value numbers-cashflow-value--income"
                                        id="totalIncomeValue"></div>
                                </div>
                                <div class="numbers-cashflow-item">
                                    <div class="numbers-section-label">Costs</div>
                                    <div class="numbers-cashflow-value numbers-cashflow-value--costs"
                                        id="expensesDisplayValue"></div>
                                </div>
                                <div class="numbers-cashflow-divider"></div>
                                <div class="numbers-cashflow-item numbers-cashflow-item--free">
                                    <div class="numbers-section-label">Free / mo</div>
                                    <div class="numbers-cashflow-value numbers-cashflow-value--free" id="freeCashValue">
                                    </div>
                                </div>
                            </div>
                            <div class="numbers-debt-hero-meta" id="debtHeroMeta" hidden></div>
                        </div>
                    </div>

                    <!-- ── Tab nav + year picker (shared) ── -->
                    <div class="numbers-bottom-nav numbers-bottom-nav--top">
                        <div class="numbers-year-picker">
                            <button class="numbers-nav-btn is-active" data-tab="tabInvest">Invest</button>
                            <button class="numbers-nav-btn" data-tab="tabIncome">Income</button>
                        </div>
                        <div class="numbers-year-picker" id="yearPicker">
                            <button class="numbers-year-btn" data-years="1">1Y</button>
                            <button class="numbers-year-btn" data-years="5">5Y</button>
                            <button class="numbers-year-btn is-active" data-years="10">10Y</button>
                            <button class="numbers-year-btn" data-years="20">20Y</button>
                            <button class="numbers-year-btn" data-years="30">30Y</button>
                        </div>
                    </div>

                    <!-- ── Tab: Invest ── -->
                    <div class="numbers-tab-view is-active" id="tabInvest">
                        <div class="numbers-card">
                            <div class="numbers-bars" id="projectionBars"></div>
                            <div class="numbers-proj-detail" id="projectionDetail"></div>
                        </div>
                    </div>

                    <!-- ── Tab: Income vs Spending ── -->
                    <div class="numbers-tab-view" id="tabIncome">
                        <div id="planAnalysis"></div>
                    </div>

                </div>
            </div>

            <div class="numbers-panels">
                <div class="numbers-panel">
                    <div class="numbers-panel__head">
                        <div class="numbers-panel__title">Income</div>
                        <div class="numbers-panel__total" id="incomePanelTotal"></div>
                    </div>
                    <div id="sourcesList" class="numbers-sources"></div>
                    <button class="numbers-reorder-btn" data-reorder-list="sourcesList" type="button">Reorder</button>
                    <button class="numbers-panel-add-btn" id="openIncomeSheet" type="button">+ Add income
                        source</button>
                </div>

                <div class="numbers-panel">
                    <div class="numbers-panel__head">
                        <div class="numbers-panel__title">Spending</div>
                        <div class="numbers-panel__total" id="spendingPanelTotal"></div>
                    </div>
                    <div id="expensesList" class="numbers-sources"></div>
                    <button class="numbers-reorder-btn" data-reorder-list="expensesList" type="button">Reorder</button>
                    <button class="numbers-panel-add-btn" id="openSpendingSheet" type="button">+ Add spending
                        category</button>
                </div>

                <div class="numbers-panel">
                    <div class="numbers-panel__head">
                        <div class="numbers-panel__title">Assets</div>
                        <div class="numbers-panel__total" id="assetsPanelTotal"></div>
                    </div>
                    <div id="assetsList" class="numbers-sources"></div>
                    <button class="numbers-reorder-btn" data-reorder-list="assetsList" type="button">Reorder</button>
                    <button class="numbers-panel-add-btn" id="openAssetsSheet" type="button">+ Add asset</button>
                </div>

                <div class="numbers-panel">
                    <div class="numbers-panel__head">
                        <div class="numbers-panel__title">Debt</div>
                        <div class="numbers-panel__total numbers-panel__total--debt" id="debtPanelTotal"></div>
                    </div>
                    <div id="debtList" class="numbers-sources"></div>
                    <button class="numbers-reorder-btn" data-reorder-list="debtList" type="button">Reorder</button>
                    <button class="numbers-panel-add-btn" id="openDebtSheet" type="button">+ Add debt</button>
                </div>

            </div>
        </div>
    </section>

    <footer class="numbers-footer">
        <p class="numbers-footer__credits">Designed and developed by Oscar Santamarina | May 2026</p>
        <p class="numbers-version">v1.0.4 &middot; 2026-05-23</p>
    </footer>
    <script src="make-numbers.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/projects/make-numbers/sw.js');
        }
    </script>
</body>

</html>
